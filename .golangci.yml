version: "2"

linters:
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - exptostd
    - fatcontext
    - gocritic
    - nilerr
    - nolintlint
    - nosprintfhostport
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gocritic:
      disabled-checks:
        - commentFormatting
        - elseif
        - ifElseChain
        - mapKey
        - singleCaseSwitch
    govet:
      enable:
        - httpresponse
  exclusions:
    rules:
      # SA5011 在测试里对 `if x == nil { t.Fatalf(...) }` 后的解引用误报
      # (CI 的 staticcheck 组合未识别 t.Fatalf 的 noreturn 语义,main 自
      # 2d05cff 起 Lint (onr-core) 即红)。正式代码不豁免。
      - path: _test\.go
        text: "SA5011"
