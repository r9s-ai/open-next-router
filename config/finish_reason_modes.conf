syntax "next-router/0.1";

finish_reason_mode "openai_chat_completions" {
  finish_reason_path "$.choices[*].finish_reason";
}

finish_reason_mode "openai_completions" {
  finish_reason_path "$.choices[*].finish_reason";
}

finish_reason_mode "openai_responses" {
  finish_reason_path "$.incomplete_details.reason";
  finish_reason_path "$.response.incomplete_details.reason" fallback=true;
}

finish_reason_mode "anthropic_messages" {
  finish_reason_path "$.stop_reason";
}

finish_reason_mode "anthropic_messages_stream" {
  finish_reason_path "$.delta.stop_reason";
  finish_reason_path "$.message.stop_reason" fallback=true;
}

finish_reason_mode "gemini_generate_content" {
  finish_reason_path "$.candidates[*].finishReason";
  finish_reason_path "$.candidates[*].finish_reason" fallback=true;
}

finish_reason_mode "gemini_generate_content_stream" {
  finish_reason_path "$.candidates[*].finishReason";
  finish_reason_path "$.candidates[*].finish_reason" fallback=true;
}
