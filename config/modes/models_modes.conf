syntax "next-router/0.1";

models_mode "openai" {
  method GET;
  path "/v1/models";
  id_path "$.data[*].id";
}

models_mode "gemini" {
  method GET;
  path "/v1beta/models";
  id_path "$.models[*].name";
  id_regex "^models/(.+)$";
}

models_mode "vertex" {
  method GET;
  path "/v1beta1/publishers/google/models";
  id_path "$.publisherModels[*].name";
  id_regex "^publishers/google/models/(.+)$";
}

models_mode "bedrock" {
  method GET;
  path "/inference-profiles?typeEquals=SYSTEM_DEFINED";
  id_path "$.inferenceProfileSummaries[*].inferenceProfileId";
  id_allow_regex "anthropic\.";
}

models_mode "bedrock_openai" {
  method GET;
  path "/v1/models";
  id_path "$.data[*].id";
}
