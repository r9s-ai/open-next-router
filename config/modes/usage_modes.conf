syntax "next-router/0.1";

usage_mode "openai_prompt_completion" {
  usage_root path="$.usage";

  usage_fact input token path="$.prompt_tokens";
  usage_fact input token path="$.input_tokens" fallback=true;

  usage_fact output token path="$.completion_tokens";
  usage_fact output token path="$.output_tokens" fallback=true;

  usage_fact cache_read token path="$.prompt_tokens_details.cached_tokens";
  usage_fact cache_read token path="$.input_tokens_details.cached_tokens" fallback=true;
  usage_fact cache_read token path="$.cached_tokens" fallback=true;
}

usage_mode "openai_chat_completions" {
  usage_extract openai_prompt_completion;

  # Chat Completions exposes web search through message/delta annotations rather than
  # explicit `web_search_call` output items. Count one search-capable annotated choice.
  usage_fact server_tool.web_search call source="response" count_path="$.choices[*].message.annotations";
  usage_fact server_tool.web_search call source="response" count_path="$.choices[*].delta.annotations" fallback=true;
}

usage_mode "openai_chat_completions_output_items" {
  usage_root path="$.usage";

  usage_fact image.input token path="$.prompt_tokens_details.image_tokens";
  usage_fact audio.input token path="$.prompt_tokens_details.audio_tokens";

  usage_fact input token path="$.prompt_tokens_details.text_tokens";
  usage_fact input token path="$.prompt_tokens" fallback=true;

  usage_fact output token path="$.completion_tokens";
  usage_fact output token path="$.output_tokens" fallback=true;

  usage_fact cache_read token path="$.prompt_tokens_details.cached_tokens";

  usage_fact server_tool.web_search call source="response" count_path="$.output[*]" type="web_search_call" status="completed";
}

usage_mode "codex_responses" {
  usage_root path="$.response.usage" event="response.completed|response.incomplete" event_optional=true;

  usage_fact input token path="$.input_tokens";
  usage_fact output token path="$.output_tokens";
  usage_fact cache_read token path="$.input_tokens_details.cached_tokens";
  usage_fact server_tool.web_search call source="response" path="$.response.tool_usage.web_search.num_requests" event="response.completed|response.incomplete" event_optional=true;
  total_tokens_expr = $.response.usage.total_tokens;
}

usage_mode "openai_responses" {
  usage_root path="$.usage";
  usage_root path="$.response.usage";

  usage_fact input token path="$.input_tokens";
  usage_fact output token path="$.output_tokens";
  usage_fact cache_read token path="$.input_tokens_details.cached_tokens";

  usage_fact server_tool.web_search call source="response" count_path="$.output[*]" type="web_search_call" status="completed";
  usage_fact server_tool.web_search call source="response" count_path="$.response.output[*]" type="web_search_call" status="completed" fallback=true;
}

usage_mode "openai_responses_stream" {
  usage_root path="$.response.usage" event="response.completed|response.incomplete" event_optional=true;

  usage_fact input token path="$.input_tokens";
  usage_fact output token path="$.output_tokens";
  usage_fact cache_read token path="$.input_tokens_details.cached_tokens";

  usage_fact server_tool.web_search call source="response" count_path="$.response.output[*]" type="web_search_call" status="completed" event="response.completed|response.incomplete" event_optional=true;
}

usage_mode "openai_embeddings" {
  usage_root path="$.usage";

  usage_fact input token path="$.prompt_tokens";
  usage_fact output token expr="0";
}

usage_mode "openai_images_generations" {
  usage_extract openai_prompt_completion;
  usage_fact image.generate image source="response" count_path="$.data[*]";
}

usage_mode "openai_images_edits" {
  usage_extract openai_prompt_completion;
  usage_fact image.edit image source="response" count_path="$.data[*]";
}

usage_mode "openai_audio_speech" {
  usage_fact audio.tts second source=derived path="$.audio_duration_seconds";
}

usage_mode "openai_audio_transcriptions" {
  usage_extract openai_prompt_completion;
  usage_fact audio.stt second path="$.seconds";
}

usage_mode "openai_audio_translations" {
  usage_extract openai_prompt_completion;
  usage_fact audio.translate second path="$.seconds";
}

usage_mode "anthropic_messages" {
  usage_root path="$.usage";

  usage_fact input token path="$.input_tokens";
  usage_fact input token path="$.cache_read_input_tokens";
  usage_fact input token path="$.cache_creation_input_tokens";
  usage_fact output token path="$.output_tokens";
  usage_fact cache_read token path="$.cache_read_input_tokens";
  usage_fact server_tool.web_search call path="$.server_tool_use.web_search_requests";

  usage_fact cache_write token path="$.cache_creation.ephemeral_5m_input_tokens" attr.ttl="5m";
  usage_fact cache_write token path="$.cache_creation.ephemeral_1h_input_tokens" attr.ttl="1h";
  usage_fact cache_write token path="$.cache_creation_input_tokens" fallback=true;
}

usage_mode "anthropic_messages_stream" {
  usage_root path="$.message.usage" event="message_start" event_optional=true;
  usage_root path="$.usage" event="message_delta" event_optional=true;

  usage_fact input token path="$.input_tokens";
  usage_fact input token path="$.cache_read_input_tokens";
  usage_fact input token path="$.cache_creation_input_tokens";

  usage_fact output token path="$.output_tokens";

  usage_fact cache_read token path="$.cache_read_input_tokens";
  usage_fact server_tool.web_search call path="$.server_tool_use.web_search_requests";

  usage_fact cache_write token path="$.cache_creation.ephemeral_5m_input_tokens" attr.ttl="5m";
  usage_fact cache_write token path="$.cache_creation.ephemeral_1h_input_tokens" attr.ttl="1h";
  usage_fact cache_write token path="$.cache_creation_input_tokens" fallback=true;
}

usage_mode "gemini_generate_content" {
  usage_root path="$.usageMetadata";

  usage_fact input token path="$.promptTokenCount";
  usage_fact image.input token path='$.promptTokensDetails[?(@.modality=="IMAGE")].tokenCount';
  usage_fact video.input token path='$.promptTokensDetails[?(@.modality=="VIDEO")].tokenCount';
  usage_fact audio.input token path='$.promptTokensDetails[?(@.modality=="AUDIO")].tokenCount';

  usage_fact output token path="$.candidatesTokenCount";
  usage_fact output token path="$.thoughtsTokenCount";

  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="TEXT")].tokenCount' attr.modality="text";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="IMAGE")].tokenCount' attr.modality="image";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="AUDIO")].tokenCount' attr.modality="audio";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="VIDEO")].tokenCount' attr.modality="video";
  usage_fact cache_read token path="$.cachedContentTokenCount" fallback=true;

  total_tokens_expr = $.usageMetadata.totalTokenCount;
}

usage_mode "gemini_generate_content_stream" {
  usage_root path="$.usageMetadata";

  usage_fact input token path="$.promptTokenCount";
  usage_fact image.input token path='$.promptTokensDetails[?(@.modality=="IMAGE")].tokenCount';
  usage_fact video.input token path='$.promptTokensDetails[?(@.modality=="VIDEO")].tokenCount';
  usage_fact audio.input token path='$.promptTokensDetails[?(@.modality=="AUDIO")].tokenCount';

  usage_fact output token path="$.candidatesTokenCount";
  usage_fact output token path="$.thoughtsTokenCount";

  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="TEXT")].tokenCount' attr.modality="text";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="IMAGE")].tokenCount' attr.modality="image";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="AUDIO")].tokenCount' attr.modality="audio";
  usage_fact cache_read token path='$.cacheTokensDetails[?(@.modality=="VIDEO")].tokenCount' attr.modality="video";
  usage_fact cache_read token path="$.cachedContentTokenCount" fallback=true;

  total_tokens_expr = $.usageMetadata.totalTokenCount;
}
