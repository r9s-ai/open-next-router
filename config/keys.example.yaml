providers:
  openai:
    keys:
      - name: "key1"
        # Option A: plaintext (not recommended for public repos)
        value: "sk-xxxx"
        # Optional: override provider base_url (e.g. route via proxy)
        # base_url_override: "https://api.openai.com"

  anthropic:
    keys:
      - name: "key1"
        # Option B: encrypted value (requires ONR_MASTER_KEY at runtime)
        # value: "ENC[v1:aesgcm:...]"
        #
        # Option C: leave empty and provide env override:
        #   ONR_UPSTREAM_KEY_ANTHROPIC_KEY1=sk-ant-xxxx
        value: ""

  gemini:
    keys:
      - name: "key1"
        # Recommended: provide env override:
        #   ONR_UPSTREAM_KEY_GEMINI_KEY1=AIzaSy...
        value: ""

  vertex:
    keys:
      - name: "vertex-sa"
        # GCP Vertex AI uses a service account JSON file instead of an API key.
        # Recommended file permission: 0600, owned by the ONR runtime user.
        credential_file: "/etc/onr/gcp/vertex-sa.json"
        # Empty location defaults to global at runtime. Regional example: us-central1.
        location: "global"
        # Optional: override provider base_url explicitly, for example to use a regional endpoint.
        # base_url_override: "https://us-central1-aiplatform.googleapis.com"

  aws-bedrock:
    keys:
      - name: "bedrock-us-east-1"
        # AWS Bedrock uses SigV4 credentials instead of a bearer API key.
        # Prefer env/secret-manager injection in production; keep this file out of public repos.
        aws_access_key_id: ""
        aws_secret_access_key: ""
        # Optional for temporary credentials.
        aws_session_token: ""
        # Required; used by the AWS SDK to derive the regional Bedrock Runtime endpoint.
        aws_region: "us-east-1"
        # Optional: endpoint override for local mock, PrivateLink, or AWS-compatible endpoint.
        # base_url_override: "https://bedrock-runtime.us-east-1.amazonaws.com"

  aws-bedrock-mantle:
    keys:
      - name: "bedrock-mantle-us-east-1"
        # Uses the same SigV4 credential shape as aws-bedrock, but targets Mantle OpenAI-compatible APIs.
        aws_access_key_id: ""
        aws_secret_access_key: ""
        aws_session_token: ""
        aws_region: "us-east-1"
        # Optional: endpoint override for local mock or a custom endpoint.
        # base_url_override: "https://bedrock-mantle.us-east-1.api.aws"

# Access keys for clients (for token key: onr:v1?...&k64=...).
access_keys:
  - name: "client-a"
    value: ""
    comment: "example client access key (set via env: ONR_ACCESS_KEY_CLIENT_A)"
