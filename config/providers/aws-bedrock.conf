syntax "next-router/0.1";

# AWS Bedrock Runtime via the generic AWS SDK transport and path routing DSL.
# base_url is optional for aws_sdk transport; omit it in normal AWS use so the
# SDK resolves the regional Bedrock Runtime endpoint from the selected channel
# region. Configure base_url only for mock, PrivateLink, or a custom
# AWS-compatible endpoint.
provider "aws-bedrock" {
  defaults {
    upstream_config {
      transport aws_sdk;
      # base_url = "https://bedrock-runtime.us-east-1.amazonaws.com";
    }

    auth {
      auth_sigv4_bedrock;
    }

    response {
      resp_passthrough;
    }

    models {
      models_mode bedrock;
    }
  }

  match api = "claude.messages" stream = false {
    request {
      model_map_default $request.model;
      json_del "$.model";
      json_del "$.stream_options";
      after_req_map {
        json_set "$.anthropic_version" "bedrock-2023-05-31";
        json_set_header_values "$.anthropic_beta" "anthropic-beta";
        json_filter_values "$.anthropic_beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
        json_del "$.inference_geo";
        json_del "$.speed";
        json_del_with_condition "$.tools" "type" "web_search*" "web_fetch*";
        json_del_with_condition "$.tool_choice" "type" "web_search*" "web_fetch*";
      }
      del_header "anthropic-version";
      del_header "anthropic-beta";
    }

    upstream {
      set_path template("/model/${request.model_mapped}/invoke");
    }

    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
  }

  match api = "claude.messages" stream = true {
    request {
      model_map_default $request.model;
      json_del "$.model";
      json_del "$.stream_options";
      after_req_map {
        json_set "$.anthropic_version" "bedrock-2023-05-31";
        json_set_header_values "$.anthropic_beta" "anthropic-beta";
        json_filter_values "$.anthropic_beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
        json_del "$.inference_geo";
        json_del "$.speed";
        json_del_with_condition "$.tools" "type" "web_search*" "web_fetch*";
        json_del_with_condition "$.tool_choice" "type" "web_search*" "web_fetch*";
      }
      del_header "anthropic-version";
      del_header "anthropic-beta";
    }

    upstream {
      set_path template("/model/${request.model_mapped}/invoke-with-response-stream");
    }

    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
  }

  match api = "chat.completions" stream = false {
    request {
      model_map_default $request.model;
      req_map openai_chat_to_anthropic_messages;
      json_del "$.stream_options";
      after_req_map {
        json_del "$.model";
        json_set "$.anthropic_version" "bedrock-2023-05-31";
        json_set_header_values "$.anthropic_beta" "anthropic-beta";
        json_filter_values "$.anthropic_beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
        json_del "$.inference_geo";
        json_del "$.speed";
        json_del_with_condition "$.tools" "type" "web_search*" "web_fetch*";
        json_del_with_condition "$.tool_choice" "type" "web_search*" "web_fetch*";
      }
      del_header "anthropic-version";
      del_header "anthropic-beta";
    }

    upstream {
      set_path template("/model/${request.model_mapped}/invoke");
    }

    response {
      resp_map anthropic_to_openai_chat;
    }

    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
  }

  match api = "chat.completions" stream = true {
    request {
      model_map_default $request.model;
      req_map openai_chat_to_anthropic_messages;
      json_del "$.stream_options";
      json_set "$.stream" true;
      after_req_map {
        json_del "$.model";
        json_set "$.anthropic_version" "bedrock-2023-05-31";
        json_set_header_values "$.anthropic_beta" "anthropic-beta";
        json_filter_values "$.anthropic_beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
        json_del "$.inference_geo";
        json_del "$.speed";
        json_del_with_condition "$.tools" "type" "web_search*" "web_fetch*";
        json_del_with_condition "$.tool_choice" "type" "web_search*" "web_fetch*";
      }
      del_header "anthropic-version";
      del_header "anthropic-beta";
    }

    upstream {
      set_path template("/model/${request.model_mapped}/invoke-with-response-stream");
    }

    response {
      sse_parse anthropic_to_openai_chunks;
    }

    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
  }

}
