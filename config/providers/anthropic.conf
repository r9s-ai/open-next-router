syntax "next-router/0.1";

# Anthropic Claude (upstream /v1/messages)
provider "anthropic" {
  defaults {
    upstream_config {
      base_url = "https://api.anthropic.com";
    }

    # Anthropic uses x-api-key (value comes from the selected upstream key)
    auth {
      auth_header_key "x-api-key";
    }

    # Anthropic API version header (adjust if needed)
    request {
      set_header "anthropic-version" "2023-06-01";
      pass_header "anthropic-beta";
      filter_header_values "anthropic-beta" "context-1m-*";
    }

    response {
      resp_passthrough;
    }
    models {
      models_mode custom;
      path "/v1/models";
      id_path "$.data[*].id";
    }

  }

  match api = "chat.completions" {
    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }

  match api = "claude.messages" stream = false {
    upstream {
      set_path "/v1/messages";
    }
    # Compatibility: some clients send OpenAI-style stream_options; Anthropic /v1/messages rejects it.
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
  }

  match api = "claude.messages" stream = true {
    upstream {
      set_path "/v1/messages";
    }
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
  }
}
