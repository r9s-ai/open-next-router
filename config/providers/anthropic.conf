syntax "next-router/0.1";

# Anthropic Claude (upstream /v1/messages)
provider "anthropic" {
  defaults {
    upstream_config {
      base_url = "https://api.anthropic.com";
    }

    # Anthropic uses x-api-key (value comes from the selected upstream key)
    auth {
      auth_header_key "x-api-key";
    }

    # Anthropic API version header (adjust if needed)
    request {
      set_header "anthropic-version" "2023-06-01";
      pass_header "anthropic-beta";
      filter_header_values "anthropic-beta" "context-1m-*";
    }

    response {
      resp_passthrough;
    }
    models {
      models_mode custom;
      path "/v1/models";
      id_path "$.data[*].id";
    }

  }

  match api = "chat.completions" {
    metrics {
      usage_extract custom;
      finish_reason_extract openai;
      usage_fact input token path="$.usage.prompt_tokens";
      usage_fact output token path="$.usage.completion_tokens";
      usage_fact cache_read token path="$.usage.prompt_tokens_details.cached_tokens";
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }

  match api = "claude.messages" stream = false {
    upstream {
      set_path "/v1/messages";
    }
    # Compatibility: some clients send OpenAI-style stream_options; Anthropic /v1/messages rejects it.
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract custom;
      finish_reason_extract anthropic;
      usage_fact input token path="$.usage.input_tokens";
      usage_fact output token path="$.usage.output_tokens";
      usage_fact cache_read token path="$.usage.cache_read_input_tokens";
      usage_fact cache_write token path="$.usage.cache_creation.ephemeral_5m_input_tokens" attr.ttl="5m";
      usage_fact cache_write token path="$.usage.cache_creation.ephemeral_1h_input_tokens" attr.ttl="1h";
      usage_fact cache_write token path="$.usage.cache_creation_input_tokens" fallback=true;
    }
  }

  match api = "claude.messages" stream = true {
    upstream {
      set_path "/v1/messages";
    }
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract anthropic;
      finish_reason_extract anthropic;
    }
  }
}
