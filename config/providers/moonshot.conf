syntax "next-router/0.1";

# Moonshot（OpenAI-compatible）
provider "moonshot" {
  defaults {
    upstream_config {
      base_url = "https://api.moonshot.ai";
      # base_url = "https://api.moonshot.cn"; # cn
    }
    auth {
      auth_bearer;
    }
    error {
      error_map openai;
    }
    response {
      resp_passthrough;
    }
    models {
      models_mode openai;
    }
    balance {
      balance_mode custom;
      path "/v1/users/me/balance";
      balance_path "$.data.available_balance";
      balance_unit CNY;
    }
  }

  match api = "chat.completions" {
    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }
  match api = "claude.messages" stream = false {
    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
    upstream {
      set_path "/anthropic/v1/messages";
    }
  }
  match api = "claude.messages" stream = true {
    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
    upstream {
      set_path "/anthropic/v1/messages";
    }
  }
  match api = "completions" {
    metrics {
      usage_extract openai_prompt_completion;
      finish_reason_extract openai_completions;
    }
    upstream {
      set_path "/v1/completions";
    }
  }
  match api = "embeddings" {
    metrics {
      usage_extract openai_embeddings;
    }
    upstream {
      set_path "/v1/embeddings";
    }
  }
  match api = "responses" stream = true {
    metrics {
      usage_extract openai_responses_stream;
      finish_reason_extract openai_responses;
    }
    upstream {
      set_path "/v1/responses";
    }
  }
  match api = "responses" {
    metrics {
      usage_extract openai_responses;
      finish_reason_extract openai_responses;
    }
    upstream {
      set_path "/v1/responses";
    }
  }
}
