syntax "next-router/0.1";

provider "uniaix" {
  defaults {
    upstream_config {
      # Gemini native base URL
      base_url = "https://www.uniaix.com";
    }
    auth {
      auth_bearer;
    }
    response {
      resp_passthrough;
    }
    metrics {
    }
    models {
      models_mode openai;
    }
  }

  match api = "chat.completions" {
    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }

  match api = "completions" {
    metrics {
      usage_extract openai_prompt_completion;
      finish_reason_extract openai_completions;
    }
    upstream {
      set_path "/v1/completions";
    }
  }

  match api = "responses" {
    metrics {
      usage_extract openai_responses;
      finish_reason_extract openai_responses;
    }
    upstream {
      set_path "/v1/responses";
    }
  }

  match api = "embeddings" {
    metrics {
      usage_extract openai_embeddings;
    }
    upstream {
      set_path "/v1/embeddings";
    }
  }

  match api = "claude.messages" stream = false {
    upstream {
      set_path "/v1/messages";
    }
    # Compatibility: some clients send OpenAI-style stream_options; Anthropic /v1/messages rejects it.
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
  }

  match api = "claude.messages" stream = true {
    upstream {
      set_path "/v1/messages";
    }
    request {
      json_del "$.stream_options";
    }
    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
  }

  match api = "gemini.generateContent" {
    upstream {
      set_path concat("/v1beta/models/", $request.model_mapped, ":generateContent");
    }
    metrics {
      usage_extract gemini_generate_content;
      finish_reason_extract gemini_generate_content;
    }
  }

  match api = "gemini.streamGenerateContent" {
    upstream {
      set_path concat("/v1beta/models/", $request.model_mapped, ":streamGenerateContent");
      set_query alt "sse";
    }
    metrics {
      usage_extract gemini_generate_content_stream;
      finish_reason_extract gemini_generate_content_stream;
    }
  }
}
