syntax "next-router/0.1";

# OpenRouter（OpenAI-compatible）
provider "openrouter" {
  defaults {
    upstream_config {
      base_url = "https://openrouter.ai/api";
    }
    auth {
      auth_bearer;
    }
    error {
      error_map openai;
    }
    response {
      resp_passthrough;
    }
    models {
      models_mode openai;
    }
    balance {
      balance_mode custom;
      path "/v1/credits";
      balance_expr = $.data.total_credits - $.data.total_usage;
      used_path "$.data.total_usage";
      balance_unit USD;
    }

    # OpenRouter 建议携带来源标识（可选）
    request {
      set_header "HTTP-Referer" "https://github.com/r9s-ai/r9s";
      set_header "X-Title" "r9s";
    }
  }

  match api = "chat.completions" {
    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }
  match api = "completions" {
    metrics {
      usage_extract openai_prompt_completion;
      finish_reason_extract openai_completions;
    }
    upstream {
      set_path "/v1/completions";
    }
  }
  match api = "claude.messages" stream = false {
    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
    upstream {
      set_path "/v1/messages";
    }
  }
  match api = "claude.messages" stream = true {
    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
    upstream {
      set_path "/v1/messages";
    }
  }
  match api = "embeddings" {
    metrics {
      usage_extract openai_embeddings;
    }
    upstream {
      set_path "/v1/embeddings";
    }
  }
  match api = "responses" {
    metrics {
      usage_extract openai_responses;
      finish_reason_extract openai_responses;
    }
    upstream {
      set_path "/v1/responses";
    }
  }
  match api = "images.generations" {
    metrics {
      usage_extract openai_images_generations;
    }
    upstream {
      set_path "/v1/images/generations";
    }
  }
  match api = "audio.speech" {
    metrics {
      usage_extract openai_audio_speech;
    }
    upstream {
      set_path "/v1/audio/speech";
    }
  }
  match api = "audio.transcriptions" {
    metrics {
      usage_extract openai_audio_transcriptions;
    }
    upstream {
      set_path "/v1/audio/transcriptions";
    }
  }
  match api = "audio.translations" {
    metrics {
      usage_extract openai_audio_translations;
    }
    upstream {
      set_path "/v1/audio/translations";
    }
  }
}
