syntax "next-router/0.1";

provider "minimax" {
  defaults {
    upstream_config {
      base_url = "https://api.minimax.io";
      # base_url = "https://api.minimax.chat"; # cn
    }
    auth {
      auth_bearer;
    }
    error {
      error_map openai;
    }
    response {
      resp_passthrough;
    }
  }

  match api = "chat.completions" {
    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
    upstream {
      set_path "/v1/chat/completions";
    }
  }

  match api = "claude.messages" stream = false {
    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
    upstream {
      set_path "/anthropic/v1/messages";
    }
  }

  match api = "claude.messages" stream = true {
    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
    upstream {
      set_path "/anthropic/v1/messages";
    }
  }

  match api = "images.generations" {
    metrics {
      usage_extract openai_images_generations;
    }
    upstream {
      set_path "/v1/image_generation";
    }
  }

  match api = "audio.speech" {
    metrics {
      usage_extract openai_audio_speech;
    }
    upstream {
      set_path "/v1/t2a_v2";
    }
  }
}
