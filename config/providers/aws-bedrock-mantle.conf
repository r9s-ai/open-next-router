syntax "next-router/0.1";

# AWS Bedrock Mantle OpenAI-compatible and Anthropic Messages APIs.
# This provider is intentionally separate from aws-bedrock, which targets
# Claude Messages via InvokeModel. Bedrock Mantle supports a different model
# set and uses native HTTP endpoints under bedrock-mantle.{region}.api.aws.
provider "aws-bedrock-mantle" {
  defaults {
    upstream_config {
      transport aws_sdk;
      # base_url = "https://bedrock-mantle.us-east-1.api.aws";
    }

    auth {
      auth_sigv4_bedrock;
    }

    response {
      resp_passthrough;
    }

    models {
      models_mode bedrock_openai;
    }
  }

  match api = "chat.completions" stream = false {
    request {
      model_map_default $request.model;
    }

    upstream {
      set_path "/v1/chat/completions";
    }

    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
  }

  match api = "chat.completions" stream = true {
    request {
      model_map_default $request.model;
      json_set "$.stream" true;
    }

    upstream {
      set_path "/v1/chat/completions";
    }

    metrics {
      usage_extract openai_chat_completions;
      finish_reason_extract openai_chat_completions;
    }
  }

  match api = "responses" stream = true {
    request {
      model_map_default $request.model;
    }

    upstream {
      set_path "/v1/responses";
    }

    metrics {
      usage_extract openai_responses_stream;
      finish_reason_extract openai_responses;
    }
  }

  match api = "responses" {
    request {
      model_map_default $request.model;
    }

    upstream {
      set_path "/v1/responses";
    }

    metrics {
      usage_extract openai_responses;
      finish_reason_extract openai_responses;
    }
  }

  match api = "claude.messages" stream = false {
    request {
      model_map_default $request.model;
      json_del "$.stream_options";
      set_header "anthropic-version" "2023-06-01";
      pass_header "anthropic-beta";
      filter_header_values "anthropic-beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
    }

    upstream {
      set_path "/anthropic/v1/messages";
    }

    metrics {
      usage_extract anthropic_messages;
      finish_reason_extract anthropic_messages;
    }
  }

  match api = "claude.messages" stream = true {
    request {
      model_map_default $request.model;
      json_del "$.stream_options";
      set_header "anthropic-version" "2023-06-01";
      pass_header "anthropic-beta";
      filter_header_values "anthropic-beta" "fine-grained-tool-streaming-2025-05-14" "computer-use-2025-01-24" "context-management-2025-06-27" "tool-search-tool-2025-10-19";
    }

    upstream {
      set_path "/anthropic/v1/messages";
    }

    metrics {
      usage_extract anthropic_messages_stream;
      finish_reason_extract anthropic_messages_stream;
    }
  }
}
