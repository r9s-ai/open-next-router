syntax "next-router/0.1";

provider "codex" {
  defaults {
    upstream_config {
      base_url = "https://chatgpt.com/backend-api/codex";
    }
    auth {
      auth_bearer;
    }
    response {
      resp_passthrough;
    }
  }

  match api = "responses" {
    request {
      json_set_if_absent "$.instructions" "";
      json_set "$.store" false;
      json_set "$.stream" true;
      json_del "$.max_output_tokens";
      json_del "$.max_tokens";
    }
    metrics {
      usage_extract codex_responses;
      finish_reason_extract codex_responses;
    }
    upstream {
      set_path "/responses";
    }
  }
}
