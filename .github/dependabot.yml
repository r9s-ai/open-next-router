version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/onr-core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/client/sdk/golang"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/client/sdk/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
