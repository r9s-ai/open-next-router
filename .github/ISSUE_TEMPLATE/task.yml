name: Task / maintenance
description: Track maintenance work, docs updates, refactors, tests, or operational follow-ups.
title: "chore: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed? Link related issues, PRs, docs, or incidents.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: false
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Break the work into concrete steps.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should completion be verified?
    validations:
      required: false
