    repeatable: false
  - id: response
    name: response
    allowed_in: [defaults, match]
    kind: block
    repeatable: false
  - id: set_header
    name: set_header
    allowed_in: [request, balance, models]
    kind: statement
    repeatable: false
  - id: set_path
    name: set_path
    allowed_in: [upstream]
    kind: statement
    repeatable: false
  - id: set_query
    name: set_query
    allowed_in: [upstream]
    kind: statement
    repeatable: false
  - id: sse_json_del_if
    name: sse_json_del_if
    allowed_in: [response]
    kind: statement
    repeatable: false
  - id: sse_parse
    name: sse_parse
    allowed_in: [response]
    kind: statement
    repeatable: false
    modes: [anthropic_to_openai_chunks, gemini_to_openai_chat_chunks, openai_responses_to_openai_chat_chunks, openai_to_anthropic_chunks, openai_to_gemini_chunks]
    args:
      - name: mode
        type: enum
        required: true
        enum: [anthropic_to_openai_chunks, gemini_to_openai_chat_chunks, openai_responses_to_openai_chat_chunks, openai_to_anthropic_chunks, openai_to_gemini_chunks]
  - id: subscription_path
    name: subscription_path
    allowed_in: [balance]
    kind: statement
    repeatable: false
  - id: syntax
    name: syntax
    allowed_in: [top]
    kind: statement
    repeatable: false
  - id: total_tokens
    name: total_tokens
    allowed_in: [metrics]
    kind: statement
    repeatable: false
  - id: upstream
    name: upstream
    allowed_in: [match]
    kind: block
    repeatable: false
  - id: upstream_config
    name: upstream_config
    allowed_in: [defaults]
    kind: block
    repeatable: false
  - id: usage_extract
    name: usage_extract
    allowed_in: [metrics]
    kind: statement
    repeatable: false
    modes: [anthropic, custom, gemini, openai]
    args:
      - name: mode
        type: enum
        required: true
        enum: [anthropic, custom, gemini, openai]
  - id: usage_path
    name: usage_path
    allowed_in: [balance]
    kind: statement
    repeatable: false
  - id: used
    name: used
    allowed_in: [balance]
    kind: statement
    repeatable: false
  - id: used_path
    name: used_path
    allowed_in: [balance]
    kind: statement
    repeatable: false
